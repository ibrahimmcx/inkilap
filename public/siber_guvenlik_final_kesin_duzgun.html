ation": "Wireshark ağ tra ği paket yakalama ve analiz aracdr. Volatility bellek analizi, EnCase ve Autopsy disk adli bilişimi, IDA Pro ise tersine mühendislik için kullanılır. Ağ adli bilişiminde ayrca tcpdump, NetworkMiner ve Zeek (Bro) gibi araçlar da kullanılır."}, {"sourceNo": 81, "topic": "Hocanın Final Sorusu", "stem": "Aşağdakilerden hangisi SaaS (Hizmet Olarak Yazlm) bulut hizmet modeline bir örnektir?", "options": ["AWS EC2", "Heroku", "Gmail", "Docker", "VMware"], "answer": 2, "explanation": "Gmail, kullanma hazr bir uygulama olarak sunulduğu için SaaS modeline örnektir. AWS EC2 bir IaaS örneği, Heroku ise bir PaaS örneğidir. Docker bir konteyner platformu, VMware ise bir sanallaştrma yazlmdr."}, {"sourceNo": 82, "topic": "Hocanın Final Sorusu", "stem": "Paylaşlan sorumluluk modelinde bulutun güvenliği (Security OF the cloud) kimin sorumluluğundadr?", "options": ["Müşterinin", "Son kullanıcınn", "Üçüncü parti denetçinin", "Bulut sağlaycsnn", "Devlet kurumlarnn"], "answer": 3, "explanation": "Paylaşlan sorumluluk modelinde bulutun güvenliği (Security OF the cloud) sağlaycnn sorumluluğundadr ve ziksel güvenlik, ağ altyaps ve hipervizör gibi katmanlar kapsar. Buluttaki güvenlik (Security IN the cloud) ise müşterinin sorumluluğundadr."}, {"sourceNo": 83, "topic": "Hocanın Final Sorusu", "stem": "Aşağdakilerden hangisi en yaygn bulut güvenlik sorunu olarak kabul edilir?", "options": ["Fiziksel sunucu arzas", "Bulut yaplandrma hatas (miscon guration)", "Elektrik kesintisi", "DNS sunucu hatas", "Donanm eskimesi"], "answer": 1, "explanation": "Bulut yaplandrma hatalar en yaygn bulut güvenlik sorunudur. Açk S3 kovalar, varsaylan güvenlik gruplar ve aşr izin veren IAM politikalar en yaygn örneklerdir. Capital One (2019) ve Twitch (2021) ihlalleri bu hatalardan kaynaklanmştr. CSPM araçlar bu hatalar otomatik olarak tespit eder."}, {"sourceNo": 84, "topic": "Hocanın Final Sorusu", "stem": "Duragan veriyi (data at rest) şifrelemek için aşağııdaki algoritmalardan hangis  sahiplerine ise en ksa sürede bildirim yap lmas gerekmektedir. Bu süre GDPR ile de paraleldir."}, {"sourceNo": 100, "topic": "Hocanın Final Sorusu", "stem": "Aşağdakilerden hangisi bir risk işleme stratejisi değildir?", "options": ["Azaltma (Mitigate)", "Transfer (Transfer)", "Kabul (Accept)", "Kaçnma (Avoid)", "Çoğaltma (Multiply)"], "answer": 4, "explanation": "Dört temel risk işleme stratejisi: Azaltma (güvenlik kontrolleri uygulama), Transfer (riski üçüncü tarafa aktarma, ör: siber sigorta), Kabul (riski bilinçli olarak kabul etme) ve Kaçnma (riskli faaliyeti durdurma) d r. Çoğaltma bir risk işleme stratejisi değildir."}, {"sourceNo": 101, "topic": "Hocanın Final Sorusu", "stem": "GDPR'n temel ilkeleri arasnda aşağııdakilerden hangisi yer alr?", "options": ["Verilerin snrsz süre saklanmas", "Mümkün olduğunca çok veri toplanmas", "Veri minimizasyonu yalnzca gerekli verilerin toplanmas", "Verilerin üçüncü tara arla serbestce paylaşlmas", "Yalnzca dijital verilerin korunmas"], "answer": 2, "explanation": "GDPR'n yedi temel ilkesinden biri Veri Minimizasyonudur: yalnzca belirtilen amaç için gerekli olan veriler toplanmaldr. Diğer ilkeler: hukuka uygunluk/adillik/şe a k, amaç snrlamas, doğruluk, saklama snrlamas, bütünlük/gizlilik ve hesap verebilirliktir."}, {"sourceNo": 102, "topic": "Hocanın Final Sorusu", "stem": "İş Sürekliliği Plan (BCP) ile Felaket Kurtarma Plan (DRP) arasndaki ilişki aşağııdakilerden hangisinde doğru ifade edilmiştir?", "options": ["DRP, BCP'nin bir alt kümesidir; BCP tüm organizasyonu, DRP BT sistemlerinin geri yüklenmesini kapsar", "BCP, DRP'nin bir alt kümesidir", "BCP ve DRP ayn şeydir", "DRP yalnzca ziksel felaketleri kapsar", "BCP yalnzca BT sistemlerini kapsar"], "answer": 0, "explanation": "BCP (İş Sürekliliği Plan) herhangi bir kesinti srasnda işletmenin çalışmaya devam etmesini sağlar ve tüm organizasyonu (insanlar, süreçler, teknoloji) kapsar. DRP (Felaket Kurtarma Plan) ise felaket sonras BT sistemlerinin geri yüklenmesine odaklanr ve BCP'nin bir alt kümesidir."}, {"sourceNo": 103, "topic": "Hocanın Final Sorusu", "stem": "Veri sn andrma seviyelerinde şifreleme anahtarlar, TC kimlik numaralar, sağlk kaytlar gibi veriler hangi seviyeye aittir?", "options": ["Açk (Public)", "Dahili (Internal)", "Gizli (Condential)", "Genel (General)", "Snrl (Restricted)"], "answer": 4, "explanation": "Bu soru hocanın final çalışma materyalindeki cevap anahtarına göre hazırlanmıştır."}]}, {"title": "Sınav 5 - Olay Müdahale ve Adli Bilişim", "description": "Hocanın final çalışma materyali ve bu sohbet boyunca gönderdiğin notlardan hazırlanmış, açıklamalı final seviyesi deneme.", "questions": [{"sourceNo": 110, "topic": "Hocanın Final Sorusu", "stem": "Aşağdaki Python kodunun çıktısı ne olur? POLICY_HIERARCHY = { \"Policy\": {\"level\": 1, \"mandatory\": True}, \"Standard\": {\"level\": 2, \"mandatory\": True}, \"Procedure\": {\"level\": 3, \"mandatory\": True}, \"Guideline\": {\"level\": 4, \"mandatory\": False}, } def get_mandatory_docs(): return [doc for doc, info in POLICY_HIERARCHY.items() if info[\"mandatory\" ]] result = get_mandatory_docs() print(result)", "options": ["['Policy', 'Standard', 'Procedure', 'Guideline']", "['Guideline']", "['Policy', 'Standard']", "['Policy', 'Standard', 'Procedure']", "['Procedure', 'Guideline']"], "answer": 3, "explanation": "Fonksiyon mandatory değeri True olan belge türlerini ltreler. Policy, Standard ve Procedure zorunludur (mandatory: True). Guideline zorunlu değildir (mandatory: False). Çkt: ['Policy', 'Standard', 'Procedure']."}, {"sourceNo": 111, "topic": "Hocanın Final Sorusu", "stem": "karşlaştrldğnda Kalitatif ve kantitatif risk değerlendirmesi aşağııdakilerden değerlendirmenin avantajdr? hangisi", "options": ["Hzl ve kolay uygulanmas", "Finansal veri gerektirmemesi", "Subjektif derecelendirmeler kullanmas", "Daha az zaman almas kantitatif", "Bütçe taleplerini hakllaştrmas ve maliyet-fayda analizine olanak tanmas"], "answer": 4, "explanation": "Kantitatif risk değerlendirmesi ALE = SLE x ARO gibi nansal formüller kullan r. Avantajlar: kesin sonuçlar verir, bütçe taleplerini saysal olarak hakllaştrr ve maliyet-fayda analizine olanak tanr. Hzl/kolay olma ve nansal veri gerektirmeme kalitatif değerlendirmenin avantajlardr."}, {"sourceNo": 112, "topic": "Hocanın Final Sorusu", "stem": "Aşağdaki Python kodunun çıktısı ne olur? def calculate_gdpr_fine(annual_revenue, violation_tier): if violation_tier == 1: max_pct = 0.02 max_fixed = 10_000_000 else: max_pct = 0.04 max_fixed = 20_000_000 percentage_fine = annual_revenue * max_pct return max(percentage_fine, max_fixed) fine = calculate_gdpr_fine( annual_revenue=500_000, violation_tier=1) print(f\"Fine: EUR {fine:,.0f}\")", "options": ["Fine: EUR 10,000,000", "Fine: EUR 10,000", "Fine: EUR 500,000", "Fine: EUR 20,000,000", "Fine: EUR 20,000"], "answer": 0, "explanation": "Katman 1 için: yüzde bazl ceza = 500.000 x 0.02 = 10.000 EUR. Sabit maksimum = 10.000.000 EUR. max(10000, 10000000) = 10.000.000 EUR. GDPR hangisi BÜYÜKSE ilkesini uygular, bu nedenle küçük bir startup bile 10 milyon EUR cezayla karş karşya kalabilir."}, {"sourceNo": null, "topic": "Kriptografi", "stem": "Bir sistemde milyonlarca küçük veri paketi hızlı şekilde şifrelenmek isteniyor. Anahtar iki taraf arasında güvenli biçimde paylaşılmış. Bu durumda en mantıklı seçim hangisidir?", "options": ["RSA kullanmak", "AES gibi simetrik algoritma kullanmak", "Hash fonksiyonu ile şifrelemek", "Base64 ile kodlamak", "Sadece dijital imza kullanmak"], "answer": 1, "explanation": "Simetrik şifreleme hızlıdır ve veri şifreleme için uygundur. RSA daha çok anahtar paylaşımı ve dijital imza gibi işlemlerde kullanılır."}, {"sourceNo": null, "topic": "Kriptografi", "stem": "Bir öğrenci 'hash değeri elimizdeyse dosyanın orijinal halini geri çıkarabiliriz' diyor. Bu ifade neden yanlıştır?", "options": ["Hash çift yönlüdür", "Hash yalnızca metinlerde çalışır", "Hash tek yönlüdür ve orijinal veriye geri dönülemez", "Hash için mutlaka pu   <script>
    const exams = JSON.parse(document.getElementById("quiz-data").textContent);
    const labels = ["A", "B", "C", "D", "E"];
    const state = {
      current: 0,
      progress: JSON.parse(localStorage.getItem("cyberFinalQuizFixedV3") || "{}")
    };

    function key() {
      return "exam_" + state.current;
    }

    function progress() {
      if (!state.progress[key()]) state.progress[key()] = {};
      return state.progress[key()];
    }

    function save() {
      localStorage.setItem("cyberFinalQuizFixedV3", JSON.stringify(state.progress));
    }

    function make(tag, className, text) {
      const el = document.createElement(tag);
      if (className) el.className = className;
      if (text !== undefined) el.textContent = text;
      return el;
    }

    function fillSelect() {
      const select = document.getElementById("examSelect");
      select.innerHTML = "";
      exams.forEach((exam, i) => {
        const opt = document.createElement("option");
        opt.value = i;
        opt.textContent = (i + 1) + ". " + exam.title;
        select.appendChild(opt);
      });
      select.value = state.current;
    }

    function updateStats() {
      const exam = exams[state.current];
      const p = progress();
      const answered = Object.keys(p).length;
      const correct = Object.values(p).filter(x => x.correct).length;
      const rate = answered ? Math.round(correct * 100 / answered) : 0;

      document.getElementById("statExam").textContent = String(state.current + 1);
      document.getElementById("statAnswered").textContent = answered + " / " + exam.questions.length;
      document.getElementById("statCorrect").textContent = String(correct);
      document.getElementById("statRate").textContent = rate + "%";
      document.getElementById("examTitle").textContent = exam.title;
      document.getElementById("examDesc").textContent = exam.description;
    }

    function render() {
      updateStats();
      const root = document.getElementById("questions");
      root.innerHTML = "";

      const exam = exams[state.current];
      const p = progress();

      exam.questions.forEach((q, qi) => {
        const record = p[qi];
        const card = make("article", "question");

        const head = make("div", "q-head");
        const title = make("h3", "q-title", (qi + 1) + ". " + q.stem);
        const tags = make("div", "tags");
        tags.appendChild(make("span", "tag", q.topic || "Genel"));
        tags.appendChild(make("span", "tag gray", q.sourceNo ? "Hoca Soru " + q.sourceNo : "Final Tarzı"));
        head.appendChild(title);
        head.appendChild(tags);

        const options = make("div", "options");

        q.options.forEach((opt, oi) => {
          const label = make("label", "option");
          if (record) {
            if (oi === q.answer) label.classList.add("correct");
            if (record.selected === oi && oi !== q.answer) label.classList.add("wrong");
          }

          const input = document.createElement("input");
          input.type = "radio";
          input.name = "q_" + qi;
          input.value = String(oi);
          if (record) input.disabled = true;
          if (record && record.selected === oi) input.checked = true;

          const span = make("span");
          const strong = make("strong", "", labels[oi] + ") ");
          span.appendChild(strong);
          span.appendChild(document.createTextNode(opt));

          label.appendChild(input);
          label.appendChild(span);
          options.appendChild(label);

          input.addEventListener("change", () => answer(qi, oi));
        });

        const fb = make("div", "feedback");
        if (record) {
          fb.classList.add("show");
          if (record.correct) {
            fb.classList.add("good");
            fb.textContent = "Doğru. " + q.explanation;
          } else {
            fb.classList.add("bad");
            fb.textContent = "Yanlış. Doğru cevap: " + labels[q.answer] + ") " + q.options[q.answer] + " — " + q.explanation;
          }
        }

        card.appendChild(head);
        card.appendChild(options);
        card.appendChild(fb);
        root.appendChild(card);
      });
    }

    function answer(qi, selected) {
      const p = progress();
      if (p[qi]) return;

      const y = window.scrollY;
      const q = exams[state.current].questions[qi];

      p[qi] = {
        selected,
        correct: selected === q.answer
      };

      save();
      render();
      window.scrollTo(0, y);
    }

    document.getElementById("loadBtn").addEventListener("click", () => {
      state.current = Number(document.getElementById("examSelect").value);
      render();
    });

    document.getElementById("resetBtn").addEventListener("click", () => {
      state.progress[key()] = {};
      save();
      render();
    });

    document.getElementById("showBtn").addEventListener("click", () => {
      const p = progress();
      exams[state.current].questions.forEach((q, i) => {
        if (!p[i]) p[i] = { selected: -1, correct: false };
      });
      save();
      render();
    });

    fillSelect();
    render();
  </script>
</body>
</html>
